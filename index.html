<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Dominic 11 Años</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Syne:wght@800&family=Silkscreen&family=Rubik+Storm&family=Playfair+Display:wght@400;700&family=Mogra&display=swap" rel="stylesheet">
</head>
<body>

    <button id="mute-btn" class="mute-control">
        <span id="mute-icon">🔊</span>
    </button>

    <div id="start-screen">
        <div class="background-wrapper">
            <img src="./img/cortina.png" class="full-img-bg" alt="Cortina">
            <div class="button-layer">
                <button id="play-btn">⚽ ¡PITAZO INICIAL!</button>
            </div>
        </div>
    </div>

    <video id="intro-video" muted playsinline>
        <source src="intro.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" loop preload="none">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="invitation" class="hidden-total">
        
        <section class="section-waooo">
            <h1 class="feliz-cumple anim-pieza" id="waooo-titulo">¡FELIZ CUMPLEAÑOS!</h1>
            <div class="nota-flotante nota-regalo anim-pieza">
                <span class="pin">📌</span>
                <p><strong>DETALLE:</strong> Lluvia de Sobres</p>
            </div>
            <div class="golden-frame anim-pieza" id="waooo-frame">
                <img src="./img/camiseta.png" class="jersey-img-waoo">
            </div>
            <div class="anim-pieza" id="waooo-texto">
                <p class="txt-invitacion-largo">¡Te invito a celebrar mis 11 años! 🥳</p>
            </div>
            <p class="scroll-indicator anim-pieza" id="waooo-scroll">Desliza para más</p>
        </section>

        <section class="section-convocatoria">
            <div class="nota-flotante nota-piscina anim-pieza">
                <span class="pin">📍</span>
                <p><strong>OUTFIT:</strong> Traje de Baño</p>
            </div>
            <h2 class="font-convocatoria anim-pieza" id="convocatoria-titulo">✨ ¡ESTÁS CONVOCADO! ✨</h2>
            <div class="anim-pieza" id="convocatoria-fecha">
                <h3 class="font-fecha">SÁBADO 23 DE MAYO <br> <span class="hora-destacada">10:00 AM</span></h3>
            </div>
            <div class="marcador-container anim-pieza" id="convocatoria-marcador">
                <p class="label-tiempo">Tiempo restante</p>
                <div id="countdown" class="font-bitcount"></div>
            </div>
            <p class="scroll-indicator anim-pieza" id="convocatoria-scroll">Desliza para confirmar</p>
        </section>

        <section class="section-location">
            <div class="location-box anim-pieza" id="location-izq">
                <h2 class="font-convocatoria">📍 UBICACIÓN</h2>
                <div class="map-wrapper">
                    <a href="https://maps.app.goo.gl/uXv7Vf6Z8M2f6e9k7" target="_blank" class="btn-ruta-flotante">🚀 RUTA</a>
                    <iframe src="https://www.google.com/maps/embed?..." width="100%" height="100%" style="border:0;" loading="lazy"></iframe>
                </div>
            </div>
            <div class="confirm-box anim-pieza" id="location-der">
                <h2 class="font-convocatoria">⚽ ¿VIENES?</h2>
                <a href="https://wa.me/593999606845" class="btn-confirmar-v2">SÍ, ¡ALLÍ ESTARÉ! ✅</a>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
